<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defi3-PAT : Observation</title>
    <style>
        :root {
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none;
        }

        header { text-align: center; width: 100%; }

        h1 {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            font-size: 1.2rem;
            margin: 5px 0;
        }

        #stats-bar {
            display: flex;
            justify-content: space-around;
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            font-size: 1rem;
            margin-bottom: 5px;
        }

        #timer-container {
            width: 100%;
            height: 6px;
            background: #222;
            margin-bottom: 10px;
            border: 1px solid #333;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink);
            transition: width 0.1s linear;
        }

        #grid-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            background: rgba(0, 255, 255, 0.05);
            padding: 5px;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            cursor: pointer;
            user-select: none;
            color: var(--neon-blue);
            text-shadow: 0 0 3px var(--neon-blue);
            font-weight: bold;
            font-size: 5.5vw;
        }

        @media (min-width: 600px) { .cell { font-size: 28px; } }

        /* Animation de clignotement pour la réponse */
        @keyframes blink-target {
            0% { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); transform: scale(1.2); }
            50% { color: white; text-shadow: none; transform: scale(1); }
            100% { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); transform: scale(1.2); }
        }

        .show-answer {
            animation: blink-target 0.3s infinite;
            z-index: 10;
            background: #333 !important;
        }

        #final-screen { text-align: center; display: none; width: 100%; }
        input { background: #111; border: 2px solid var(--neon-blue); color: white; padding: 10px; text-align: center; margin: 10px 0; width: 80%; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; color: var(--neon-blue); }
        th { border-bottom: 1px solid var(--neon-pink); color: var(--neon-pink); }
        td { padding: 5px; border-bottom: 1px solid #222; }
        .btn { background: none; border: 2px solid var(--neon-pink); color: var(--neon-pink); padding: 10px 20px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <header id="game-header">
        <h1>Defi3-PAT : OBSERVATION</h1>
        <div id="stats-bar">
            <span>Manche: <span id="round">1</span>/10</span>
            <span>Cible: <span id="target-char" style="color:white">?</span></span>
            <span>Score: <span id="score">0</span></span>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
    </header>

    <div id="grid-container">
        <div id="grid"></div>
        <div id="final-screen">
            <h2 style="color:var(--neon-blue);">SESSION TERMINÉE</h2>
            <div id="score-submission">
                <p>Ton Score: <span id="final-points" style="color:var(--neon-pink); font-size: 1.5rem;">0</span>/10</p>
                <input type="text" id="username" placeholder="TON NOM" maxlength="12">
                <br><button class="btn" onclick="saveScore()">ENREGISTRER</button>
            </div>
            <div id="leaderboard-section" style="display:none;">
                <h3>CLASSEMENT</h3>
                <table id="score-table"><thead><tr><th>NOM</th><th>SCORE</th></tr></thead><tbody id="score-body"></tbody></table>
                <button class="btn" onclick="resetGame()">REJOUER</button>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let round = 1;
        let timerDuration = 10000;
        let timerInterval;
        let gameActive = false;
        let targetCellRef = null;

        const pairs = [
            { b: 'B', t: '8' }, { b: 'O', t: '0' }, { b: 'S', t: '5' },
            { b: 'I', t: '1' }, { b: 'M', t: 'W' }, { b: 'N', t: 'H' },
            { b: 'E', t: 'F' }, { b: 'X', t: 'K' }, { b: 'G', t: '6' }
        ];

        function initRound() {
            if (round > 10) return endGame();
            
            gameActive = true;
            const grid = document.getElementById('grid');
            const targetCharSpan = document.getElementById('target-char');
            document.getElementById('round').textContent = round;
            
            grid.innerHTML = '';
            const pair = pairs[Math.floor(Math.random() * pairs.length)];
            targetCharSpan.textContent = pair.t;

            const targetIndex = Math.floor(Math.random() * 100);

            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const isTarget = (i === targetIndex);
                cell.textContent = isTarget ? pair.t : pair.b;
                
                if (isTarget) targetCellRef = cell;

                cell.onclick = () => { 
                    if (isTarget && gameActive) { 
                        score++; 
                        document.getElementById('score').textContent = score;
                        revealAndNext(true); 
                    } 
                };
                grid.appendChild(cell);
            }
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            const timerBar = document.getElementById('timer-bar');
            const start = Date.now();
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - start;
                const remaining = timerDuration - elapsed;
                timerBar.style.width = Math.max(0, (remaining / timerDuration) * 100) + "%";

                if (remaining <= 0) { 
                    clearInterval(timerInterval); 
                    revealAndNext(false); 
                }
            }, 50);
        }

        function revealAndNext(win) {
            gameActive = false;
            clearInterval(timerInterval);
            
            // Faire clignoter la réponse
            targetCellRef.classList.add('show-answer');

            // Attendre 1.2 seconde pour laisser l'utilisateur voir la réponse
            setTimeout(() => {
                targetCellRef.classList.remove('show-answer');
                round++;
                if (round <= 10) initRound();
                else endGame();
            }, 1200);
        }

        function endGame() {
            document.getElementById('grid').style.display = 'none';
            document.getElementById('game-header').style.visibility = 'hidden';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('final-points').textContent = score;
        }

        function saveScore() {
            const name = document.getElementById('username').value.trim() || "ANONYME";
            let leaderboard = JSON.parse(localStorage.getItem('defi3_scores') || '[]');
            leaderboard.push({ name: name, score: score });
            leaderboard.sort((a, b) => b.score - a.score);
            localStorage.setItem('defi3_scores', JSON.stringify(leaderboard.slice(0, 5)));
            showLeaderboard();
        }

        function showLeaderboard() {
            document.getElementById('score-submission').style.display = 'none';
            document.getElementById('leaderboard-section').style.display = 'block';
            const body = document.getElementById('score-body');
            const leaderboard = JSON.parse(localStorage.getItem('defi3_scores') || '[]');
            body.innerHTML = leaderboard.map(s => `<tr><td>${s.name}</td><td>${s.score}/10</td></tr>`).join('');
        }

        function resetGame() {
            score = 0; round = 1;
            document.getElementById('score').textContent = "0";
            document.getElementById('grid').style.display = 'grid';
            document.getElementById('game-header').style.visibility = 'visible';
            document.getElementById('final-screen').style.display = 'none';
            document.getElementById('score-submission').style.display = 'block';
            document.getElementById('leaderboard-section').style.display = 'none';
            initRound();
        }

        initRound();
    </script>
</body>
</html>
